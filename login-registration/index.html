<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>registration website</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Borel&family=Edu+SA+Beginner&family=Henny+Penny&family=Inconsolata&family=Josefin+Sans:wght@300&family=Mukta:wght@300&family=Poppins:ital,wght@1,100&family=Shantell+Sans:wght@300&family=Ysabeau+Infant:ital@1&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <form id="login">
      <h2 class="heading">Login to continue</h2>
      <div>
        <label>Email</label>
        <input id="loginemail" type="email" placeholder="your email" />
      </div>
      <div>
        <label>password</label>
        <input id="loginpswd" type="password" placeholder="your password" />
        <h3 class="error" id="error"></h3>
      </div>
      <button onclick="login()">Login</button>
      <h4>
        Not a user?
        <span onclick="navigation()"> register here </span>
      </h4>
    </form>

    <form id="registration">
      <h2 class="heading">Registration</h2>
      <div>
        <label>Name </label>
        <input id="rname" type="text" placeholder="your name" />
      </div>
      <div>
        <label>Email</label>
        <input id="email" type="email" placeholder="your email" />
      </div>
      <div>
        <label>Password</label>
        <input id="rpswd" type="password" placeholder="your password" />
      </div>
      <div>
        <label>Confirm password</label>
        <input id="rcpswd" type="password" placeholder="your password again" />
      </div>
      <h3 class="error" id="rerror"></h3>
      <button onclick="registration()">Register</button>
    </form>
    <script src="script.js"></script>
  </body>
</html>
